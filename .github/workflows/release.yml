name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Generate crates.io token
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish qbey to crates.io
        run: cargo publish -p qbey

      - name: Wait for crates.io index update
        run: sleep 30

      - name: Publish qbey-mysql to crates.io
        run: cargo publish -p qbey-mysql
